function filteredQuestionPool(){
  let pool=basePoolByLevel().filter(questionFitsFilters);
  if(teacherFilters.length) pool=[...focusQuestionBank(),...pool];
  return pool.length?pool:basePoolByLevel();
}
function rebuildQuestionPool(){
  Q=filteredQuestionPool();

}

  document.getElementById('teacherPanel').innerHTML=`<div class="teacherGrid"><div class="teacherBox"><h3>1. 題庫難度</h3><select id="teacherLevel"><option value="low" ${selectedLevel==='low'?'selected':''}>低年級</option><option value="mid" ${selectedLevel==='mid'?'selected':''}>中年級（含低年級）</option><option value="high" ${selectedLevel==='high'?'selected':''}>高年級（含低中高）</option></select><h3>2. 本輪題數</h3><input id="teacherLimit" type="number" min="3" max="30" value="${teacherQuestionLimit}"><div class="miniNote">目前可用題目：<b>${preview}</b> 題。建議課堂搶答用 8～12 題。</div></div><div class="teacherBox"><h3>3. 只練指定標點</h3><div class="miniNote">${modeText}<br>重點：勾選後，遊戲畫面不會出現未勾選的標點按鈕。</div><div class="filterGrid">${PUNCTS.map(p=>`<button class="filterBtn ${teacherFilters.includes(p)?'on':''}" data-tap="toggleFilter('${p}')">${p}</button>`).join('')}</div><button class="btn" data-tap="clearFilters()" style="margin-top:10px">清除篩選／全部標點</button></div><div class="teacherBox"><h3>4. 本輪常錯標點</h3><div class="wrongList">${wrongHtml}</div></div><div class="teacherBox"><h3>5. 使用建議</h3><div class="miniNote">單一標點補救：只勾一個。<br>低年級：建議勾 ， 。 ？ ！。<br>中年級：可加入 ：「」《》。<br>挑戰賽：清除篩選，顯示全部。</div></div></div>`;
}
function applyTeacherSettings(){
  selectedLevel=document.getElementById('teacherLevel')?.value||selectedLevel;
  teacherQuestionLimit=Math.max(3,Math.min(30,parseInt(document.getElementById('teacherLimit')?.value||teacherQuestionLimit,10)));

function msgTeacher(t){console.log(t)}
function recordWrong(p,q){
  q.ans.forEach((a,i)=>{if(!p.selected || p.selected[i]!==a){p.wrongBy[a]=(p.wrongBy[a]||0)+1;classWrongBank.push(a)}});
}

function soloWrong(p){p.wrong++;p.combo=0;p.hp-=15;recordWrong(p,current(p));showAnalysis(p,false);sync(p);if(p.hp<=0){showResult('挑戰結束',[p]);return}keepCorrect(p);updateQ(p)}
function pkWrong(p){p.wrong++;p.combo=0;p.atk=p.baseAtk;recordWrong(p,current(p));beep('bad');showAnalysis(p,false);keepCorrect(p);updateQ(p);sync(p)}

function startBuzzer(){
  rebuildQuestionPool();
  mode='buzzer';
  let n1=document.getElementById('pkName1')?.value?.trim()||'玩家1';
  let n2=document.getElementById('pkName2')?.value?.trim()||'玩家2';
  bz={players:[makePlayer(1,n1,roles[1]),makePlayer(2,n2,roles[2])],questions:shuffle([...Q]).slice(0,teacherQuestionLimit),idx:0,active:0,selected:[],locked:false,hints:0};
  bz.players.forEach(p=>{p.hp=100;p.score=0;p.correct=0;p.wrong=0;p.combo=0;p.wrongBy={}});
  renderBuzzer();
  show('buzzer');
}
function currentBzQ(){return bz.questions[bz.idx % bz.questions.length]}
function renderBuzzer(){
  if(!bz) return;
  set('bzName1',bz.players[0].name);set('bzName2',bz.players[1].name);
  syncBzScore();
  document.getElementById('bzKeys').innerHTML=activePuncts().map(x=>`<button class="pbtn" data-tap="bzPick('${x}')">${x}</button>`).join('');
  updateBzQuestion();
}
function updateBzQuestion(){
  let q=currentBzQ(),i=0,first=bz.selected.findIndex(v=>!v);if(first<0)first=bz.selected.length;
  document.getElementById('bzQuestion').innerHTML=q.text.replaceAll('___',()=>{let val=bz.selected[i]||'___',cls='blank '+(i===first?'pending ':'')+(val&&val===q.ans[i]?'correctKeep ':'')+(val&&val!==q.ans[i]?'wrongKeep ':'');i++;return `<span class="${cls}">${val}</span>`});
  let status=bz.active?`${bz.players[bz.active-1].name} 已搶答，請作答`:`第 ${bz.idx+1}/${bz.questions.length} 題：請兩隊先搶答`;
  set('bzStatus',status);
  document.querySelectorAll('.buzzBtn').forEach(btn=>btn.classList.toggle('locked',!!bz.active));
  document.getElementById('bzAnalysis')?.classList.remove('show');
}
function syncBzScore(){bz.players.forEach(p=>{set('bzScore'+p.id,p.score);set('bzHp'+p.id,Math.max(0,Math.round(p.hp)))})}
function buzz(id){if(!bz || bz.active || bz.locked)return;bz.active=id;bz.selected=[];bz.hints=0;beep('hint');updateBzQuestion()}
function bzPick(s){if(!bz.active){set('bzStatus','請先搶答，再選標點');return}let q=currentBzQ();let idx=bz.selected.findIndex(v=>!v);if(idx<0)idx=bz.selected.length;if(idx<q.ans.length){bz.selected[idx]=s;updateBzQuestion()}}
function bzCancel(){bz.selected=[];updateBzQuestion()}
function bzSubmit(){
  if(!bz.active){set('bzStatus','請先搶答');return}
  let p=bz.players[bz.active-1],opp=bz.players[bz.active===1?1:0],q=currentBzQ();
  if(bz.selected.filter(Boolean).length<q.ans.length){set('bzStatus','還有空格沒有填完');return}
  p.selected=bz.selected;
  let ok=q.ans.every((a,i)=>a===bz.selected[i]);
  if(ok){p.correct++;p.combo++;p.score+=10+p.combo*2;opp.hp=Math.max(0,opp.hp-(8+p.combo));beep('ok');set('bzStatus',`答對！${p.name} 攻擊成功`);}
  else{p.wrong++;p.combo=0;p.hp=Math.max(0,p.hp-8);recordWrong(p,q);beep('bad');showBzAnalysis(false);set('bzStatus',`答錯！${p.name} 失去 8HP`);}
  syncBzScore();
  bz.locked=true;
  setTimeout(()=>{if(opp.hp<=0 || p.hp<=0 || bz.idx>=bz.questions.length-1){endBuzzer()}else{nextBuzzerQuestion()}}, ok?700:1400);
}
function nextBuzzerQuestion(){if(!bz)return;bz.idx=(bz.idx+1)%bz.questions.length;bz.active=0;bz.selected=[];bz.locked=false;updateBzQuestion()}
function bzHint(){if(!bz)return;let q=currentBzQ();bz.hints++;let idx=bz.selected.findIndex((v,i)=>!v||v!==q.ans[i]);if(idx<0)idx=0;let a=q.ans[idx],r=RULES[a]||[a,'依題意選擇正確標點。'];let text=bz.hints===1?`第${idx+1}格：${r[0]}`:bz.hints===2?r[1]:`第${idx+1}格答案是：${a}`;let el=document.getElementById('bzAnalysis');el.innerHTML=`💡 ${text}`;el.classList.add('show');beep('hint')}
function bzAnalysis(){showBzAnalysis(true)}
function showBzAnalysis(detail=true){let q=currentBzQ(),bad=[];q.ans.forEach((a,i)=>{if(bz.selected[i]!==a)bad.push(i)});let i=bad[0]??0,a=q.ans[i],r=RULES[a]||[a,'依題意選擇正確標點。'];let el=document.getElementById('bzAnalysis');el.innerHTML=`<b>❌ 第${i+1}格</b> 正確：<b>${a}</b><div>${r[0]}：${r[1]}</div>${detail?`<div class="detail">題目提示：${q.tip}</div>`:''}`;el.classList.add('show')}
function endBuzzer(){if(!bz)return;showResult('搶答結束！',bz.players)}



/* === V10.3：教學模式 / 遊戲模式切換 === */

document.getElementById('musicBtn').onclick=toggleMusic;document.getElementById('fsBtn').onclick=()=>document.fullscreenElement?document.exitFullscreen?.():document.documentElement.requestFullscreen?.();['master','music','sfx'].forEach(k=>{document.getElementById(k+'Vol').oninput=e=>{let v=e.target.value/100;if(k==='master')master=v;if(k==='music')musicVol=v;if(k==='sfx')sfxVol=v}});(function validate(){let bad=[];[['低',LOW_Q],['中',MID_Q],['高',HIGH_Q]].forEach(([lv,arr])=>arr.forEach((q,i)=>{let b=(q.text.match(/___/g)||[]).length;if(b!==q.ans.length)bad.push(`${lv}第${i+1}題空格${b}/答案${q.ans.length}`);q.ans.forEach(a=>{if(!PUNCTS.includes(a))bad.push(`${lv}第${i+1}題缺按鍵 ${a}`)})}));if(bad.length)console.warn('題庫檢查',bad);rebuildQuestionPool();})();


/* === V10.4.2：技能系統穩定版 === */
const SKILL_NAMES={1:'聖光斬',2:'治癒術',3:'精準箭',4:'煙霧彈',5:'守護盾'};
function skillNameOf(p){return SKILL_NAMES[p?.hero]||'勇者技能'}
function gainEnergy(p,amt){if(p)p.energy=Math.min(100,(p.energy||0)+amt)}
function spendEnergy(p){if(!p||(p.energy||0)<100)return false;p.energy=0;return true}
function skillFlash(text){const d=document.createElement('div');d.className='skillFlash';d.textContent=text;document.body.appendChild(d);setTimeout(()=>d.remove(),950)}
function updateSkillUI(p){if(!p)return;set('energy'+p.id,Math.round(p.energy||0));w('efill'+p.id,Math.min(100,p.energy||0));const b=document.getElementById('skill'+p.id);if(b){b.textContent=`${skillNameOf(p)} ${(p.energy||0)>=100?'★':''}`;b.classList.toggle('ready',(p.energy||0)>=100)}}
function applyAttackModifiers(attacker,defender,dmg){if(attacker?.weak){dmg=Math.max(1,Math.round(dmg*0.5));attacker.weak=false}if(defender?.shield){dmg=Math.max(1,Math.round(dmg*0.5));defender.shield=false}return dmg}
const syncBeforeSkill=sync;
sync=function(p){syncBeforeSkill(p);updateSkillUI(p);if(mode==='pk'&&pk)pk.forEach(updateSkillUI)};
function autoFillOneForPlayer(p){const q=current(p);let idx=p.selected.findIndex((v,i)=>!v||v!==q.ans[i]);if(idx<0)idx=0;p.selected[idx]=q.ans[idx];updateQ(p);return idx+1}
function useSkill(id){const p=getPlayer(id);if(!p)return;if(!spendEnergy(p)){msg(id,'能量未滿：答對題目可累積技能能量');return}const name=skillNameOf(p);beep('hint');if(mode==='pk'){const opp=pk.find(x=>x.id!==p.id);if(p.hero===1){let dmg=applyAttackModifiers(p,opp,18);opp.hp=Math.max(0,opp.hp-dmg);msg(id,`技能：${name}，造成 ${dmg}HP 傷害`)}else if(p.hero===2){p.hp=Math.min(p.maxHp,p.hp+22);msg(id,`技能：${name}，回復 22HP`)}else if(p.hero===3){let n=autoFillOneForPlayer(p);msg(id,`技能：${name}，第 ${n} 格自動命中`)}else if(p.hero===4){opp.weak=true;msg(id,`技能：${name}，對手下一次攻擊減半`)}else{p.shield=true;msg(id,`技能：${name}，下一次受到傷害減半`)}sync(p);sync(opp);skillFlash(`${p.name} 發動 ${name}！`);if(opp.hp<=0)showResult(`${p.name} 勝利！`,pk);return}if(mode==='adventure'){if(p.hero===1){p.mhp=Math.max(0,p.mhp-32);msg(id,`技能：${name}，怪獸受到 32HP 傷害`)}else if(p.hero===2){p.hp=Math.min(p.maxHp,p.hp+25);msg(id,`技能：${name}，回復 25HP`)}else if(p.hero===3){let n=autoFillOneForPlayer(p);msg(id,`技能：${name}，第 ${n} 格自動命中`)}else if(p.hero===4){p.atk+=8;msg(id,`技能：${name}，下一次攻擊力提升`)}else{p.hp=Math.min(p.maxHp,p.hp+12);p.atk+=4;msg(id,`技能：${name}，防禦並蓄力`)}sync(p);skillFlash(`發動 ${name}！`);if(p.mhp<=0){p.kills++;p.score+=50;p.mmax+=18;p.mhp=p.mmax;if(p.kills>=5){showResult('冒險成功！',[p]);return}sync(p)}}}
const soloCorrectBeforeSkill=soloCorrect;
soloCorrect=function(p){gainEnergy(p,25);soloCorrectBeforeSkill(p);sync(p)};
const pkCorrectBeforeSkill=pkCorrect;
pkCorrect=function(p){let opp=pk.find(x=>x.id!==p.id);p.correct++;p.combo++;gainEnergy(p,28);let dmg=damage(p.combo),hp=heal(p.combo);dmg=applyAttackModifiers(p,opp,dmg);p.hp=Math.min(p.maxHp,p.hp+hp);p.score+=20+Math.floor(dmg);opp.hp=Math.max(0,opp.hp-dmg);p.selected=[];p.qIndex++;beep('ok');showLocal(p.id,p.combo>=5?'EXCELLENT':p.combo>=3?'GREAT':'PERFECT',dmg);animatePK(p.id);msg(p.id,`答對！傷害 ${dmg}HP${hp?`，回血 ${hp}HP`:''}，能量 +28`);hideAnalysis(p.id);sync(p);sync(opp);if(opp.hp<=0){showResult(`${p.name} 勝利！`,pk);return}updateQ(p)};
const pkWrongBeforeSkill=pkWrong;
pkWrong=function(p){p.energy=Math.max(0,(p.energy||0)-10);pkWrongBeforeSkill(p);msg(p.id,'答錯！能量 -10，Combo 歸零');sync(p)};
function updateBuzzerSkillUI(){if(!bz)return;bz.players.forEach(p=>{set('bzEnergy'+p.id,Math.round(p.energy||0));const b=document.getElementById('bzSkill'+p.id);if(b){b.textContent=`P${p.id} ${skillNameOf(p)}${(p.energy||0)>=100?'★':''}`;b.classList.toggle('ready',(p.energy||0)>=100)}})}
const syncBzScoreBeforeSkill=syncBzScore;
syncBzScore=function(){syncBzScoreBeforeSkill();updateBuzzerSkillUI()};
function bzAutoFillOne(){let q=currentBzQ();let idx=bz.selected.findIndex((v,i)=>!v||v!==q.ans[i]);if(idx<0)idx=0;bz.selected[idx]=q.ans[idx];updateBzQuestion();return idx+1}
function useBuzzerSkill(id){if(!bz)return;let p=bz.players[id-1],opp=bz.players[id===1?1:0];if(!spendEnergy(p)){set('bzStatus',`${p.name} 能量未滿，答對可累積技能`);syncBzScore();return}let name=skillNameOf(p);beep('hint');if(p.hero===1){let dmg=applyAttackModifiers(p,opp,16);opp.hp=Math.max(0,opp.hp-dmg);set('bzStatus',`${p.name} 發動${name}，造成 ${dmg}HP 傷害`)}else if(p.hero===2){p.hp=Math.min(p.maxHp,p.hp+22);set('bzStatus',`${p.name} 發動${name}，回復 22HP`)}else if(p.hero===3){if(!bz.active)bz.active=id;let n=bzAutoFillOne();set('bzStatus',`${p.name} 發動${name}，第 ${n} 格自動填入`)}else if(p.hero===4){opp.weak=true;set('bzStatus',`${p.name} 發動${name}，對手下一次攻擊減半`)}else{p.shield=true;set('bzStatus',`${p.name} 發動${name}，下一次受到傷害減半`)}syncBzScore();skillFlash(`${p.name} 發動 ${name}！`);if(opp.hp<=0)endBuzzer()}
bzSubmit=function(){if(!bz.active){set('bzStatus','請先搶答');return}let p=bz.players[bz.active-1],opp=bz.players[bz.active===1?1:0],q=currentBzQ();if(bz.selected.filter(Boolean).length<q.ans.length){set('bzStatus','還有空格沒有填完');return}p.selected=bz.selected;let ok=q.ans.every((a,i)=>a===bz.selected[i]);if(ok){p.correct++;p.combo++;gainEnergy(p,30);let dmg=applyAttackModifiers(p,opp,8+p.combo);p.score+=10+p.combo*2;opp.hp=Math.max(0,opp.hp-dmg);beep('ok');set('bzStatus',`答對！${p.name} 攻擊成功，能量 +30`)}else{p.wrong++;p.combo=0;p.hp=Math.max(0,p.hp-8);p.energy=Math.max(0,(p.energy||0)-10);recordWrong(p,q);beep('bad');showBzAnalysis(false);set('bzStatus',`答錯！${p.name} 失去 8HP，能量 -10`)}syncBzScore();bz.locked=true;setTimeout(()=>{if(opp.hp<=0||p.hp<=0||bz.idx>=bz.questions.length-1){endBuzzer()}else{nextBuzzerQuestion()}},ok?800:1500)};
const renderBuzzerBeforeSkill=renderBuzzer;
renderBuzzer=function(){renderBuzzerBeforeSkill();updateBuzzerSkillUI()};
const renderPKBeforeSkill=renderPK;
renderPK=function(){renderPKBeforeSkill();pk.forEach(updateSkillUI)};


/* === 電子白板多點觸控修正：用 pointerdown 取代 click/onclick === */
(function enableMultiTouchBoard(){
  function fire(expr, el){
    try{
      new Function(expr).call(el);
    }catch(err){
      console.error('觸控指令執行失敗：', expr, err);
    }
  }
  function handleTap(e){
    const el = e.target && e.target.closest ? e.target.closest('[data-tap]') : null;
    if(!el) return;

    // 有 PointerEvent 時，以 pointerdown 為主，避免 touchstart/mousedown 重複觸發。
    if(window.PointerEvent && e.type !== 'pointerdown') return;

    // 每一顆按鈕各自短暫鎖定，避免同一手指產生雙觸發；
    // 不使用全域 lock，所以左右玩家可同時操作。
    if(el.dataset.tapBusy === '1') return;
    el.dataset.tapBusy = '1';
    setTimeout(()=>{ el.dataset.tapBusy = '0'; }, 120);

    e.preventDefault();
    e.stopPropagation();
    fire(el.getAttribute('data-tap'), el);
  }

  document.addEventListener('pointerdown', handleTap, {capture:true, passive:false});
  document.addEventListener('touchstart', handleTap, {capture:true, passive:false});
  document.addEventListener('mousedown', handleTap, {capture:true, passive:false});
})();

applyDisplayMode();
